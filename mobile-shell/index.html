<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>EconoPulse</title>
  <style>
    html, body { margin:0; padding:0; height:100%; background:#05070d; color:#e7eaf2; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
    .wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:18px; padding:24px; text-align:center; }
    .logo { width:96px; height:96px; border-radius:24px; background:linear-gradient(135deg,#2563eb,#10b981); }
    h1 { font-size:22px; font-weight:700; margin:0; }
    p { font-size:14px; color:#9ca3af; max-width:320px; line-height:1.5; margin:0; }
    button { margin-top:8px; padding:12px 22px; border-radius:10px; border:0; background:#2563eb; color:#fff; font-weight:600; font-size:15px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo"></div>
    <h1>EconoPulse</h1>
    <p>You appear to be offline. Reconnect to access live market intelligence.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
